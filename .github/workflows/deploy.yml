# .github/workflows/deploy.yml
name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          JWT_ACCESS_SECRET: test_secret_at_least_32_chars_long_here
          JWT_REFRESH_SECRET: test_refresh_secret_32_chars_long_here
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 7d
          NODE_ENV: test
          PORT: 3001
          FRONTEND_URL: http://localhost:3000
          AI_SERVICE_URL: http://localhost:8000
          REDIS_URL: redis://localhost:6379

  test-ai:
    name: Test AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/ai/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test import
        run: python -c "from app.main import app; print('AI service OK')"

  deploy-notification:
    name: Notify Deploy
    runs-on: ubuntu-latest
    needs: [test-api, test-ai]
    if: success()
    steps:
      - name: Success
        run: echo "All tests passed - Railway and Vercel will auto-deploy from main branch"
